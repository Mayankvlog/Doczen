worker_processes auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;

events {
    multi_accept on;
    worker_connections 65535;
    use epoll;
}

http {
    charset utf-8;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;
    log_not_found off;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log combined buffer=512k flush=1m;
    error_log /var/log/nginx/error.log warn;

    # Timeouts
    keepalive_timeout 65;
    keepalive_requests 100;
    client_body_timeout 60;
    client_header_timeout 60;
    send_timeout 60;
    proxy_connect_timeout 60;
    proxy_send_timeout 60;
    proxy_read_timeout 300;

    # Buffer sizes
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;
    proxy_temp_file_write_size 10m;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Cache zones
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=static_cache:10m max_size=1g inactive=7d use_temp_path=off;
    proxy_cache_path /var/cache/nginx/uploads levels=1:2 keys_zone=upload_cache:10m max_size=2g inactive=1d use_temp_path=off;

    # Upstream backend servers
    upstream backend_servers {
        least_conn;
        server 127.0.0.1:5000 max_fails=3 fail_timeout=30s weight=10;
        server 127.0.0.1:5001 max_fails=3 fail_timeout=30s weight=5 backup;
        keepalive 32;
    }

    upstream frontend_servers {
        least_conn;
        server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        listen [::]:80;
        server_name doczen.app www.doczen.app;
        return 301 https://$server_name$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name doczen.app www.doczen.app;

        # SSL certificates
        ssl_certificate /etc/letsencrypt/live/doczen.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/doczen.app/privkey.pem;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header Content-Security-Policy "
            default-src 'self';
            script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com;
            style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
            font-src 'self' https://fonts.gstatic.com;
            img-src 'self' data: blob:;
            connect-src 'self' https://api.doczen.app ws://doczen.app;
            frame-src 'none';
            object-src 'none';
            base-uri 'self';
            form-action 'self';
        " always;

        # Root for frontend build
        root /var/www/doczen/client/build;
        index index.html;

        # Static file caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            proxy_cache static_cache;
            proxy_cache_valid 200 30d;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_revalidate on;
            proxy_cache_lock on;
            access_log off;
        }

        # Service Worker
        location = /service-worker.js {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        # API routes
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 10;

            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            proxy_buffering on;
            proxy_cache upload_cache;
            proxy_cache_valid 200 1h;
            proxy_cache_key "$scheme$request_method$host$request_uri";

            # Rate limit uploads
            location /api/pdf/merge {
                limit_req zone=upload_limit burst=5 nodelay;
                client_max_body_size 200M;
                proxy_pass http://backend_servers;
            }

            location /api/pdf/ {
                limit_req zone=upload_limit burst=10 nodelay;
                client_max_body_size 100M;
                proxy_pass http://backend_servers;
            }

            location /api/auth/ {
                limit_req zone=auth_limit burst=3 nodelay;
                proxy_pass http://backend_servers;
            }
        }

        # File download with resume support
        location /api/pdf/download/ {
            internal;
            alias /var/www/doczen/server/uploads/;
            add_header Content-Disposition "attachment";
            add_header Accept-Ranges bytes;
            limit_rate 10m;
        }

        # Uploads direct access (protected)
        location /uploads/ {
            internal;
            alias /var/www/doczen/server/uploads/;
            add_header Cache-Control "private, no-store, no-cache, must-revalidate";
        }

        # WebSocket support
        location /ws/ {
            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # SPA fallback - serve index.html for all non-file routes
        location / {
            try_files $uri $uri/ /index.html;

            # Don't cache index.html
            location = /index.html {
                expires -1;
                add_header Cache-Control "no-store, no-cache, must-revalidate";
            }
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Deny access to backup/config files
        location ~ \.(env|git|htaccess|htpasswd|bak|config|sql|log)$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Custom error pages
        error_page 400 401 402 403 404 /404.html;
        error_page 429 /429.html;
        error_page 500 502 503 504 /50x.html;

        location = /404.html {
            internal;
            root /var/www/doczen/client/build;
        }

        location = /429.html {
            internal;
            root /var/www/doczen/client/build;
            add_header Retry-After 60;
        }

        location = /50x.html {
            internal;
            root /var/www/doczen/client/build;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # API-only subdomain for direct API access
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.doczen.app;

        ssl_certificate /etc/letsencrypt/live/api.doczen.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.doczen.app/privkey.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        location / {
            limit_req zone=api_limit burst=30 nodelay;

            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering on;
            proxy_cache upload_cache;
            proxy_cache_valid 200 5m;
        }
    }
}
